<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>se.fragment — GLSL shader editor</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,200..800;1,200..800&display=swap">

    <link rel="stylesheet" href="src/css/styles.css">

    <script type="importmap">
    {
      "imports": {
        "codemirror": "https://esm.sh/*codemirror@6.0.1",
        "@codemirror/state": "https://esm.sh/*@codemirror/state@6.4.1",
        "@codemirror/view": "https://esm.sh/*@codemirror/view@6.26.3",
        "@codemirror/language": "https://esm.sh/*@codemirror/language@6.10.1",
        "@codemirror/commands": "https://esm.sh/*@codemirror/commands@6.5.0",
        "@codemirror/search": "https://esm.sh/*@codemirror/search@6.5.6",
        "@codemirror/autocomplete": "https://esm.sh/*@codemirror/autocomplete@6.16.0",
        "@codemirror/lint": "https://esm.sh/*@codemirror/lint@6.5.0",
        "@codemirror/legacy-modes/mode/clike": "https://esm.sh/*@codemirror/legacy-modes@6.4.0/mode/clike",
        "@codemirror/theme-one-dark": "https://esm.sh/*@codemirror/theme-one-dark@6.1.2",
        "@lezer/common": "https://esm.sh/*@lezer/common@1.2.1",
        "@lezer/highlight": "https://esm.sh/*@lezer/highlight@1.2.0",
        "@lezer/lr": "https://esm.sh/*@lezer/lr@1.4.0",
        "style-mod": "https://esm.sh/style-mod@4.1.2",
        "w3c-keyname": "https://esm.sh/w3c-keyname@2.2.8",
        "crelt": "https://esm.sh/crelt@1.0.6",
        "@replit/codemirror-vim": "https://esm.sh/*@replit/codemirror-vim@6.2.1"
      }
    }
    </script>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="grain" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>

    <div id="editorOverlay" role="dialog" aria-modal="true" aria-labelledby="editorTitle">
        <div id="editorPanel">
            <span class="bracket br-tl" aria-hidden="true"></span>
            <span class="bracket br-tr" aria-hidden="true"></span>
            <span class="bracket br-bl" aria-hidden="true"></span>
            <span class="bracket br-br" aria-hidden="true"></span>

            <div id="editorHeader">
                <div class="path-mark">
                    <span class="path-prefix">se</span>
                    <span class="path-slash">/</span>
                    <span class="path-name">editor</span>
                    <span class="path-ext">.frag</span>
                    <span class="path-status">● live</span>
                </div>
                <h2 id="editorTitle">Fragment</h2>
                <button id="applyBtn" type="button"><span class="ab-stamp">commit</span><span class="ab-meta">⇧⌘↩</span></button>
            </div>

            <div id="errorMsg" role="alert"></div>

            <div id="codeContainer"></div>

            <div id="editorFooter">
                <div class="ef-col">
                    <span class="ef-label">uniforms</span>
                    <span class="ef-value">time · resolution · mouse · mouseClick · mouseDown</span>
                </div>
                <div class="ef-col">
                    <span class="ef-label">modal</span>
                    <span class="ef-value">esc · normal &nbsp;·&nbsp; i · insert</span>
                </div>
                <div class="ef-col">
                    <span class="ef-label">keys</span>
                    <span class="ef-value">⌘E editor &nbsp;·&nbsp; ⌘S save &nbsp;·&nbsp; ⇧⌘↩ commit &nbsp;·&nbsp; ⌘, prefs</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="src/js/main.js"></script>
</body>
</html>
